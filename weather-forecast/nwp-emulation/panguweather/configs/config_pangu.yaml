fit:
    seed_everything: 1978

    model:
        class_path: transformer_module.PanguModule
        init_args:
            plevel_patch_size: [2, 4, 4]
            checkpoint_activation: True
            mean_file: ./data/era5_mean_from_graphcast_to_pangu.nc
            stddev_file: ./data/era5_stddev_from_graphcast_to_pangu.nc
            lr: 0.0005

    data:
        class_path: data.ERA5DataModule
        init_args:
            zarr_store: ./data/era5-2007-2021-13-24h-0p25deg-chunk-1.zarr-v2
            train_time: slice('2007-01-01', '2017-12-31')
            val_time: slice('2019-01-01', '2019-12-31')
            test_time: ['2018', '2020', '2021']
            train_time_step: 24
            test_time_step: 72
            constant_mask_list: ['land_sea_mask', 'soil_type', 'geopotential_at_surface']
            batch_size: 1
            num_workers: 4
            
    
    trainer:
        max_epochs: 100
        accelerator: "gpu"
        devices: 4
        accumulate_grad_batches: 48
        strategy: "ddp"
        log_every_n_steps: 1
        callbacks:
            - class_path: lightning.pytorch.callbacks.LearningRateMonitor
              init_args: 
                logging_interval: epoch
                log_weight_decay: True
                
test:
    model:
        class_path: transformer_module.PanguModule
        init_args:
            plevel_patch_size: [2, 4, 4]
            checkpoint_activation: False
            mean_file: ./data/era5_mean_from_graphcast_to_pangu.nc
            stddev_file: ./data/era5_stddev_from_graphcast_to_pangu.nc

    data:
        class_path: data.ERA5DataModule
        init_args:
            zarr_store: ./data/era5-2007-2021-13-24h-0p25deg-chunk-1.zarr-v2
            train_time: slice('2007-01-01', '2017-12-31')
            val_time: slice('2019-01-01', '2019-12-31')
            test_time: ['2018', '2020', '2021']
            train_time_step: 24
            test_time_step: 72
            constant_mask_list: ['land_sea_mask', 'soil_type', 'geopotential_at_surface']
            batch_size: 16
            num_workers: 16
            
    
    trainer:
        max_epochs: 1
        accelerator: "gpu"
        devices: 1
        
